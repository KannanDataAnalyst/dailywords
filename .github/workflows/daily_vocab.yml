name: Daily Vocabulary Automation Pipeline

on:
  schedule:
    # Runs everyday at 01:00 AM UTC (which is 6:30 AM IST)
        # 1. Morning Batch: 9:00 AM IST (3:30 AM UTC)
    #- cron: '30 3 * * *'
    
    # 2. Afternoon Batch: 1:00 PM IST (7:30 AM UTC)
    #- cron: '30 7 * * *'
    
    # 3. Evening Batch: 7:00 PM IST (1:30 PM UTC)
    #- cron: '30 13 * * *'
    
  workflow_dispatch: # Allows you to manually trigger it anytime via the GitHub UI

jobs:
  run-vocab-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/checkout@v4
      with:
        python-version: '3.10'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests snowflake-connector-python

    - name: Execute Pipeline Script
      env:
        # Snowflake Mapping (Using your exact existing naming conventions)
        SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
        SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
        
        # Email Alert Mapping
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        
        # Telegram Channel Mapping
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py
